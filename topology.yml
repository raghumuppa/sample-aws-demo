name: library-junior-hacker-adaptive

hosts:
  # Upstream uses the OpenStack image "kali" with man_user "debian".
  # On AWS the equivalent is the Marketplace image debian-kali-last-snapshot-amd64,
  # whose default login is "kali" (not "debian"). Requires a Marketplace
  # subscription: https://aws.amazon.com/marketplace/pp?sku=7lgvy7mt78lgoi4lant0znp5h
  - name: attacker
    base_box:
      image: ami-0e374f53890263001
      man_user: kali
    flavor: t3.medium

  - name: server
    base_box:
      image: ami-0635b68d5cdcb86e6
      man_user: ubuntu
    flavor: t3.small
    hidden: True

  - name: client
    base_box:
      image: ami-0635b68d5cdcb86e6
      man_user: ubuntu
    flavor: t3.small
    hidden: True

routers:
  - name: router
    base_box:
      image: ami-05d6feeb792ebaeff
      man_user: admin
    flavor: t3.xlarge

networks:
  - name: target-switch
    cidr: 10.10.20.0/24
    accessible_by_user: False
  - name: attacker-switch
    cidr: 10.10.30.0/24

net_mappings:
  - host: attacker
    network: attacker-switch
    ip: 10.10.30.23
  - host: server
    network: target-switch
    ip: 10.10.20.9
  - host: client
    network: target-switch
    ip: 10.10.20.4

router_mappings:
  - router: router
    network: target-switch
    ip: 10.10.20.254
  - router: router
    network: attacker-switch
    ip: 10.10.30.254

groups: []
