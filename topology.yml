name: aws-demo-training

hosts:
  - name: server
    base_box:
      image: ami-0635b68d5cdcb86e6   # Ubuntu Noble 24.04 amd64 (eu-west-1)
      man_user: ubuntu
    flavor: t3.small

  - name: client
    base_box:
      image: ami-0635b68d5cdcb86e6   # Ubuntu Noble 24.04 amd64 (eu-west-1)
      man_user: ubuntu
    flavor: t3.small

routers:
  - name: router
    base_box:
      image: ami-05d6feeb792ebaeff   # Debian 12 amd64 (eu-west-1)
      man_user: admin
    flavor: t3.xlarge                # >=4 ENIs required on AWS

networks:
  - name: server-switch
    cidr: 10.10.20.0/24
    accessible_by_user: False
  - name: client-switch
    cidr: 10.10.30.0/24

net_mappings:
  - host: server
    network: server-switch
    ip: 10.10.20.5
  - host: client
    network: client-switch
    ip: 10.10.30.5

router_mappings:
  - router: router
    network: server-switch
    ip: 10.10.20.254   # AWS reserves .1-.3; router gateway moved off .1
  - router: router
    network: client-switch
    ip: 10.10.30.254

groups: []
