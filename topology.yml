name: library-junior-hacker-adaptive

hosts:
  - name: attacker
    base_box:
      image: ami-0635b68d5cdcb86e6
      man_user: ubuntu
    flavor: t3.small

  - name: server
    base_box:
      image: ami-0635b68d5cdcb86e6
      man_user: ubuntu
    flavor: t3.small
    hidden: True

  - name: client
    base_box:
      image: ami-0635b68d5cdcb86e6
      man_user: ubuntu
    flavor: t3.small
    hidden: True

routers:
  - name: router
    base_box:
      image: ami-05d6feeb792ebaeff
      man_user: admin
    flavor: t3.xlarge

networks:
  - name: target-switch
    cidr: 10.10.20.0/24
    accessible_by_user: False
  - name: attacker-switch
    cidr: 10.10.30.0/24

net_mappings:
  - host: attacker
    network: attacker-switch
    ip: 10.10.30.23
  - host: server
    network: target-switch
    ip: 10.10.20.9
  - host: client
    network: target-switch
    ip: 10.10.20.4

router_mappings:
  - router: router
    network: target-switch
    ip: 10.10.20.254
  - router: router
    network: attacker-switch
    ip: 10.10.30.254

groups: []
